{% extends 'base.html' %}

{% block conteudo %}
<form action="{{url_for('login')}}" method="post">
    <label>
        email:
        <input type="text" name="form-email">
    </label><label>
    senha:
    <input type="password" name="form-senha">
</label>
    <button type="submit">Entrar</button>

</form>
<a href="" data-bs-toggle="modal" data-bs-target="#staticBackdrop">Não tem conta?Registre-se</a><br><br>
<a href="{{url_for('logout')}}">SAIR</a>


<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">Novo Usuario</h1>
            </div>
            <div class="modal-body">
                <form class="form-nome" action="{{ url_for('cadastro_usuario') }}" method="post">
                    <label>
                        Nome:
                        <input placeholder="Digite seu nome" name="form-nome" class="form-control">
                        E-Mail:
                        <input placeholder="Digite seu email" name="form-email" class="form-control">
                        Senha:
                        <input placeholder="Digite sua senha" name="form-senha" class="form-control">

                    </label>

                    <button type="submit">Cadastrar</button>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>


{% endblock %}
